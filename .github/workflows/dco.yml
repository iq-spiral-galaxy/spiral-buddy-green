name: DCO

# PR의 모든 커밋이 DCO sign-off(Signed-off-by)를 포함하는지 검사.
# CLA 동의의 자동 게이트 — sign-off 없는 외부 기여는 머지 전에 막힘.
# pull_request 이벤트에만 동작하므로 main 직접 push / 릴리즈 태그와 무관.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  dco-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Signed-off-by on every commit
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          missing=0
          while read -r sha; do
            [ -z "$sha" ] && continue
            msg=$(git log -1 --format=%B "$sha")
            who=$(git log -1 --format='%an <%ae>' "$sha")
            if ! printf '%s\n' "$msg" | grep -qiE '^Signed-off-by: .+ <.+@.+>'; then
              echo "::error::커밋 ${sha:0:8} 에 DCO Signed-off-by 가 없습니다 — 작성자: $who"
              missing=1
            fi
          done < <(git rev-list "$BASE_SHA..$HEAD_SHA")
          if [ "$missing" -ne 0 ]; then
            echo ""
            echo "기여 시 각 커밋에 sign-off 가 필요합니다:"
            echo "  git commit -s        (새 커밋)"
            echo "  git commit --amend -s   (마지막 커밋 보정)"
            echo "  git rebase --signoff main   (여러 커밋 일괄)"
            echo "자세한 내용: CONTRIBUTING.md"
            exit 1
          fi
          echo "✓ 모든 커밋에 DCO sign-off 확인됨"
